---
# 使い方:
#   ansible-playbook mp4museum/setup_mp4museum.yml -l mon-player-00   # 単台テスト
#   ansible-playbook mp4museum/setup_mp4museum.yml                    # 全台

- name: mp4museum Pi 5 プレイヤーセットアップ
  hosts: players:players_wall
  gather_facts: no

  tasks:
    # --- Python ファイル配布 ---
    # python-vlc は Pure Python のため .deb 不要。vlc.py と本体を配布するだけ。
    # libvlc は VLC インストール済みのため Pi 側に既存。

    - name: vlc.py (python-vlc バインディング) 配布
      copy:
        src: vlc.py
        dest: /home/mon/vlc.py
        owner: mon
        group: mon
        mode: '0644'
      tags: scripts

    - name: mp4m-pi5.py 配布
      copy:
        src: mp4m-pi5.py
        dest: /home/mon/mp4m-pi5.py
        owner: mon
        group: mon
        mode: '0755'
      tags: scripts
